name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://blue_airco:ci-only@localhost:5432/blue_airco_support

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blue_airco_support
          POSTGRES_USER: blue_airco
          POSTGRES_PASSWORD: ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blue_airco -d blue_airco_support"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Verify application import
        run: |
          python -c "from app.main import app; print(f'Imported FastAPI app: {app.title}')"

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Run unit tests
        run: python -m pytest tests/unit -vv -ra

      - name: Run integration and scenario tests
        run: python -m pytest tests/integration tests/scenario -vv -ra
